<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Coin outer circle -->
  <circle cx="32" cy="32" r="30" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
  
  <!-- Coin inner shading -->
  <circle cx="32" cy="32" r="27" fill="url(#coinGradient)" stroke="none"/>
  
  <!-- Dollar sign -->
  <g transform="translate(32, 32)">
    <!-- Vertical line of $ -->
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Top curve of $ -->
    <path d="M -6 -4 Q 0 -6 6 -4" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Bottom curve of $ -->
    <path d="M -6 4 Q 0 6 6 4" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Coin edge highlight -->
  <ellipse cx="32" cy="16" rx="28" ry="6" fill="rgba(255, 255, 255, 0.3)"/>
  
  <!-- Gradient definition -->
  <defs>
    <radialGradient id="coinGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>